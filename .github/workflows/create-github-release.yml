name: Create GitHub Release

# Triggered when auto-tag.yml creates a vX.Y.Z tag on push to main.
# Creates a GitHub Release with CHANGELOG notes for that version.

on:
  push:
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag format
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' does not match vMAJOR.MINOR.PATCH format."
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Extract CHANGELOG notes
        id: notes
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NOTES=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md \
            | head -n -1 | tail -n +2 | sed '/^[[:space:]]*$/d' | head -200)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.version.outputs.tag }}"
          fi
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "Release ${{ steps.version.outputs.tag }}" \
            --notes-file /tmp/release_notes.md \
            --verify-tag
          echo "::notice::GitHub Release ${{ steps.version.outputs.tag }} created"
