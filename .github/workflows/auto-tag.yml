name: Release

# Triggered on any push to main.
# Reads the top version from CHANGELOG.md — if that tag doesn't exist yet,
# creates the tag and GitHub Release in one job.
# Branch name and commit message don't matter.

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect new version in CHANGELOG
        id: detect
        run: |
          VERSION=$(grep -m1 '^## \[[0-9]' CHANGELOG.md | sed 's/## \[\([^]]*\)\].*/\1/')
          if [ -z "$VERSION" ]; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          TAG="v${VERSION}"
          if git tag | grep -qx "$TAG"; then
            echo "is_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "version=${TAG}" >> "$GITHUB_OUTPUT"
            echo "semver=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "is_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: steps.detect.outputs.is_release == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.detect.outputs.version }}" -m "Release ${{ steps.detect.outputs.version }}"
          git push origin "${{ steps.detect.outputs.version }}"

      - name: Extract CHANGELOG notes
        if: steps.detect.outputs.is_release == 'true'
        id: notes
        run: |
          VERSION="${{ steps.detect.outputs.semver }}"
          NOTES=$(awk "/^## \[${VERSION}\]/,/^## \[/" CHANGELOG.md \
            | head -n -1 | tail -n +2 | sed '/^[[:space:]]*$/d' | head -200)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${{ steps.detect.outputs.version }}"
          fi
          echo "$NOTES" > /tmp/release_notes.md

      - name: Create GitHub Release
        if: steps.detect.outputs.is_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.detect.outputs.version }}" \
            --title "Release ${{ steps.detect.outputs.version }}" \
            --notes-file /tmp/release_notes.md
          echo "::notice::GitHub Release ${{ steps.detect.outputs.version }} created"
